# ─── Chaos UI — Docker Compose ──────────────────────────────────
# 一键部署: docker compose up -d
# 访问地址: http://localhost:8080
#          http://localhost:8080/storybook
#
# 默认从 GHCR 拉取预构建镜像。
# 如需从源码构建，取消注释 build 配置并注释 image 配置即可。
# ─────────────────────────────────────────────────────────────────

services:
  chaos-ui:
    # ── 方式 A: 从 registry 拉取（推荐，一键部署） ──
    image: ghcr.io/chao2hang/chaos-ui:latest

    # ── 方式 B: 从源码构建（需要 Dockerfile + 源码） ──
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: chaos-ui
    restart: unless-stopped
    ports:
      - "8080:8080"
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
