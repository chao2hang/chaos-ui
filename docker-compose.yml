# ─── Chaos UI — Docker Compose ──────────────────────────────────
# 一键部署: docker compose up -d
#
# 访问地址:
#   http://localhost:${DOCS_PORT:-8080}       → 组件官网 (Next.js)
#   http://localhost:${STORYBOOK_PORT:-3002}   → Storybook 交互式文档
#
# 端口可通过环境变量配置，例如:
#   DOCS_PORT=3000 STORYBOOK_PORT=9000 docker compose up -d
#
# 默认从 GHCR 拉取预构建镜像。
# 如需从源码构建，取消注释 build 配置并注释 image 配置即可。
# ─────────────────────────────────────────────────────────────────

services:
  chaos-ui:
    # ── 方式 A: 从 registry 拉取（推荐，一键部署） ──
    image: ghcr.io/chao2hang/chaos-ui:${TAG:-latest}

    # ── 方式 B: 从源码构建（需要 Dockerfile + 源码） ──
    # build:
    #   context: .
    #   dockerfile: Dockerfile

    container_name: chaos-ui
    restart: unless-stopped
    ports:
      - "${DOCS_PORT:-8080}:8080"
      - "${STORYBOOK_PORT:-3002}:3002"
    environment:
      - NODE_ENV=production
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8080",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
