name: Setup pnpm + Node
description: Setup pnpm, Node 22, restore node_modules cache, and install dependencies. Requires the repo to be checked out first.

runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v4

    - name: Setup Node
      uses: actions/setup-node@v4
      with:
        node-version: "22"
        cache: pnpm

    - name: Restore node_modules cache
      id: node-modules
      uses: actions/cache@v4
      with:
        path: |
          **/node_modules
        key: node-modules-${{ runner.os }}-node22-${{ hashFiles('pnpm-lock.yaml') }}
        restore-keys: |
          node-modules-${{ runner.os }}-node22-

    - name: Install dependencies (cache miss)
      if: steps.node-modules.outputs.cache-hit != 'true'
      shell: bash
      run: pnpm install --frozen-lockfile

    - name: Verify install (cache hit)
      if: steps.node-modules.outputs.cache-hit == 'true'
      shell: bash
      run: pnpm install --frozen-lockfile --offline
