name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      storybook: ${{ steps.filter.outputs.storybook }}
      package: ${{ steps.filter.outputs.package }}
      docs: ${{ steps.filter.outputs.docs }}
    steps:
      - uses: actions/checkout@v4
      - id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            storybook:
              - 'components/**'
              - 'src/stories/**'
              - '.storybook/**'
            package:
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'tsup.config.*'
              - 'package.json'
            docs:
              - 'apps/docs/**'
              - 'components/**'
              - 'hooks/**'
              - 'lib/**'
              - 'src/stories/**'
              - 'package.json'
              - 'pnpm-lock.yaml'

  typecheck:
    name: TypeScript Check
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run typecheck

  typecheck-docs:
    name: Docs Site Typecheck
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      # Docs resolve @chaos_team/chaos-ui types from dist; keep declarations fresh.
      - name: Build package declarations
        run: pnpm run build:pkg
      - name: Docs site + app typecheck
        run: pnpm run typecheck:docs

  lint:
    name: ESLint + StyleLint + DepCruise
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run lint
      - run: pnpm run lint:css
      - run: pnpm run lint:deps

  test:
    name: Unit Tests + Coverage
    needs: changes
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: npx vitest run --coverage --coverage.thresholds.lines=60

  build-package:
    name: Build Package + Smoke + Size
    needs: changes
    if: needs.changes.outputs.package == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run prepack
      - name: Smoke test (tarball integrity)
        run: pnpm run smoke
      - name: Form control primitives (bare select)
        run: pnpm run check:form-details -- --fail-on-bare

  docs-mdx-live:
    name: Docs MDX Live-Handler Guard
    needs: changes
    if: ${{ needs.changes.outputs.docs == 'true' || github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Fail on live MDX event handlers outside CodeBlock
        run: pnpm run check:docs-mdx-live -- --fail

  build-storybook:
    name: Build Storybook
    needs: changes
    if: needs.changes.outputs.storybook == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - run: pnpm run build-storybook
      - name: Upload Storybook artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: storybook-static
          path: storybook-static/
          retention-days: 1

  commitlint:
    name: Commit Lint
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - uses: ./.github/actions/setup
      - run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose
