name: Stale Issues & PRs

on:
  schedule:
    # Run daily at 02:00 UTC
    - cron: "0 2 * * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Mark stale
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          # Issues
          days-before-issue-stale: 30
          days-before-issue-close: 7
          stale-issue-label: "stale"
          stale-issue-message: >
            This issue has been inactive for 30 days and is marked as stale.
            It will be closed in 7 days unless there is new activity.
          close-issue-message: >
            This issue was closed due to inactivity. Feel free to reopen
            if the issue persists.
          exempt-issue-labels: "pinned,security,roadmap"
          # PRs
          days-before-pr-stale: 45
          days-before-pr-close: 14
          stale-pr-label: "stale"
          stale-pr-message: >
            This PR has been inactive for 45 days and is marked as stale.
            It will be closed in 14 days unless there is new activity.
          close-pr-message: >
            This PR was closed due to inactivity. Feel free to reopen
            if the work is still relevant.
          exempt-pr-labels: "pinned,security,dependencies"
          # Misc
          operations-per-run: 30
