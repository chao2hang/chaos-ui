name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  actions: read

jobs:
  release:
    name: Build & Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Quality gate lives on the developer machine (`pnpm run release:check`)
      # and on main CI. Release only re-builds the package and publishes.
      - name: Require commit on main + green CI
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          SHA="${GITHUB_SHA}"
          REPO="${GITHUB_REPOSITORY}"
          echo "Release commit: ${SHA}"

          # Need origin/main tip to verify the tag commit is on main.
          git fetch origin main
          if ! git merge-base --is-ancestor "${SHA}" origin/main; then
            echo "::error::Release tag commit is not on origin/main. Tag only commits that are already on main."
            exit 1
          fi
          echo "✓ commit is ancestor of origin/main"

          # Poll CI workflow for this exact SHA (max ~12 min).
          # Only workflow file ci.yml counts — not Docker / Nightly / Security.
          DEADLINE=$((SECONDS + 720))
          while true; do
            SUCCESS=$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=20" \
              --jq '[.workflow_runs[] | select(.conclusion == "success")] | length')
            FAILURE=$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=20" \
              --jq '[.workflow_runs[] | select(.conclusion == "failure" or .conclusion == "timed_out" or .conclusion == "cancelled")] | length')
            IN_PROGRESS=$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=20" \
              --jq '[.workflow_runs[] | select(.status == "in_progress" or .status == "queued" or .status == "pending" or .status == "waiting" or .status == "requested")] | length')
            LATEST_URL=$(gh api \
              "repos/${REPO}/actions/workflows/ci.yml/runs?head_sha=${SHA}&per_page=1" \
              --jq '.workflow_runs[0].html_url // empty')

            echo "CI: success=${SUCCESS} failure=${FAILURE} in_progress=${IN_PROGRESS}"
            [ -n "${LATEST_URL}" ] && echo "Latest CI run: ${LATEST_URL}"

            if [ "${SUCCESS}" -gt 0 ]; then
              echo "✓ CI green for ${SHA}"
              break
            fi

            if [ "${FAILURE}" -gt 0 ] && [ "${IN_PROGRESS}" -eq 0 ]; then
              echo "::error::CI failed for ${SHA}. Fix main CI before releasing."
              exit 1
            fi

            if [ "${SECONDS}" -ge "${DEADLINE}" ]; then
              echo "::error::Timed out waiting for green CI on ${SHA}."
              exit 1
            fi

            echo "Waiting for CI…"
            sleep 30
          done

      - uses: ./.github/actions/setup

      # setup action has no registry-url; configure npm auth for publish.
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Build package (+ size-limit)
        run: pnpm run prepack

      - name: Publish to npmjs.org
        # --ignore-scripts: full gates run via release:check (local) + CI on main.
        # prepack already ran above; do not re-run typecheck/test here.
        run: pnpm publish --access public --no-git-checks --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Build release notes from CHANGELOG.md
        id: notes
        run: |
          set -euo pipefail
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          OUT="${RUNNER_TEMP}/release-notes.md"
          node scripts/extract-changelog-section.mjs "$VERSION" > "$OUT"
          {
            echo "path=$OUT"
            echo "version=$VERSION"
          } >> "$GITHUB_OUTPUT"
          echo "---- release notes preview ----"
          head -n 80 "$OUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          # Prefer CHANGELOG Fixed/Added/Notes so consumers see what shipped.
          body_path: ${{ steps.notes.outputs.path }}
          generate_release_notes: false
          draft: false
          prerelease: ${{ contains(github.ref, '-rc') || contains(github.ref, '-beta') }}
