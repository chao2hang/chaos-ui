name: Nightly Build

on:
  schedule:
    # Run daily at 03:00 UTC
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  nightly-check:
    name: Full Quality Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup

      - name: Type check (package)
        run: pnpm run typecheck

      - name: Build package declarations
        run: pnpm run build:pkg

      - name: Type check (docs site)
        run: pnpm run typecheck:docs

      - name: Lint
        run: pnpm run check

      - name: Unit tests with coverage
        run: pnpm test -- --coverage

      - name: Build package
        run: pnpm run prepack

      - name: Smoke test
        run: pnpm run smoke

      - name: Form control primitives (bare select)
        run: pnpm run check:form-details -- --fail-on-bare

      - name: Docs MDX live-handler guard
        run: pnpm run check:docs-mdx-live -- --fail

      - name: Build Storybook
        run: pnpm run build-storybook

      - name: Install Playwright browsers (chromium)
        run: npx playwright install chromium

      - name: Accessibility scan (axe-core)
        run: |
          npx serve storybook-static -p 6006 --no-clipboard &
          node scripts/a11y-scan.mjs http://localhost:6006

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-coverage
          path: coverage/
          retention-days: 7

      - name: Upload Storybook artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-storybook
          path: storybook-static/
          retention-days: 7
